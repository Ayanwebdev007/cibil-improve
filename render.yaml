# Render Blueprint Specification for Cibil Improve
# Ref: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: cibil-improve
    env: static
    buildCommand: npm install && npm run build
    publishDir: dist
    headers:
      - path: '/*'
        headers:
          - key: Cache-Control
            value: public, max-age=31536000, immutable
      - path: '/*.html'
        headers:
          - key: Cache-Control
            value: public, max-age=0, must-revalidate
